<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 200" width="512" height="200">
  <defs>
    <linearGradient id="signal-grad-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="200" rx="16" fill="#1a1a2e"/>

  <!-- Duck (lighter fill for dark background) -->
  <g transform="translate(20, 28)">
    <!-- Body -->
    <ellipse cx="55" cy="88" rx="48" ry="32" fill="#E0E0E0"/>
    <!-- Head -->
    <circle cx="95" cy="55" r="30" fill="#E0E0E0"/>
    <!-- Tail feathers -->
    <path d="M 14 75 C 5 64, -1 50, -4 40
             C 4 52, 9 63, 13 71
             C 3 56, -3 40, -6 28
             C 3 46, 10 62, 14 72 Z" fill="#E0E0E0"/>
    <!-- Upper bill -->
    <path d="M 118 50 C 130 46, 140 47, 144 51
             C 144 55, 142 58, 138 59 L 118 56 Z" fill="#FFB74D"/>
    <!-- Lower bill -->
    <path d="M 118 56 L 136 56 C 138 60, 137 63, 134 64
             L 118 60 Z" fill="#FF9800"/>
    <!-- Eye -->
    <circle cx="107" cy="46" r="6" fill="#1a1a2e"/>
    <circle cx="109" cy="44" r="3.5" fill="#1a1a1a"/>
    <circle cx="110.5" cy="43" r="1.2" fill="white"/>
  </g>

  <!-- Analytics signal -->
  <g transform="translate(155, 0)">
    <!-- Baseline -->
    <line x1="0" y1="100" x2="350" y2="100" stroke="#333355" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Smooth signal path -->
    <path d="M 0 100 L 20 100
             Q 40 40, 58 100
             L 72 100
             Q 92 -16, 112 100
             Q 117 120, 122 100
             L 142 100
             Q 165 -44, 188 100
             Q 199 16, 210 100
             L 228 100
             Q 248 10, 268 100
             L 278 100
             Q 298 -30, 318 100
             Q 330 24, 342 100
             L 350 100"
          stroke="url(#signal-grad-dark)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Event dots -->
    <circle cx="39" cy="70" r="4.5" fill="#FFD54F" stroke="#1a1a2e" stroke-width="1.5"/>
    <circle cx="92" cy="42" r="5" fill="#FFB74D" stroke="#1a1a2e" stroke-width="1.5"/>
    <circle cx="165" cy="28" r="6" fill="#FFB74D" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="199" cy="58" r="4.5" fill="#FF9800" stroke="#1a1a2e" stroke-width="1.5"/>
    <circle cx="248" cy="55" r="5" fill="#FFD54F" stroke="#1a1a2e" stroke-width="1.5"/>
    <circle cx="298" cy="35" r="6" fill="#FFB74D" stroke="#1a1a2e" stroke-width="2"/>
    <circle cx="330" cy="62" r="4.5" fill="#FF9800" stroke="#1a1a2e" stroke-width="1.5"/>

    <!-- Event labels -->
    <text x="165" y="16" font-family="'SF Mono', 'Consolas', monospace" font-size="9" fill="#FFD54F" text-anchor="middle" font-weight="600">(?1)</text>
    <text x="298" y="23" font-family="'SF Mono', 'Consolas', monospace" font-size="9" fill="#FFD54F" text-anchor="middle" font-weight="600">(?2)</text>
  </g>

  <!-- Title -->
  <text x="256" y="168" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#E0E0E0" text-anchor="middle" letter-spacing="3">BEHAVIORAL</text>
  <text x="256" y="190" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="400" fill="#888899" text-anchor="middle" letter-spacing="5">FOR DUCKDB</text>
</svg>
